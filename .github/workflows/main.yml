name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux:
    name: Linux Tauri Build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libglm-dev \
            ninja-build \
            libwayland-dev \
            libx11-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run frontend:build

      - name: Build projectM 4
        run: |
          PROJECTM_VERSION=4.1.6
          PROJECTM_PREFIX="$RUNNER_TEMP/projectm-install"
          git clone --depth 1 --branch "v${PROJECTM_VERSION}" --recursive --shallow-submodules \
            https://github.com/projectM-visualizer/projectm.git "$RUNNER_TEMP/projectm-src"
          cmake -S "$RUNNER_TEMP/projectm-src" -B "$RUNNER_TEMP/projectm-build" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$PROJECTM_PREFIX" \
            -DBUILD_SHARED_LIBS=ON
          cmake --build "$RUNNER_TEMP/projectm-build" --parallel
          cmake --install "$RUNNER_TEMP/projectm-build"
          {
            echo "CMAKE_PREFIX_PATH=$PROJECTM_PREFIX:$CMAKE_PREFIX_PATH"
            echo "PKG_CONFIG_PATH=$PROJECTM_PREFIX/lib/pkgconfig:$PROJECTM_PREFIX/lib/x86_64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH"
            echo "LD_LIBRARY_PATH=$PROJECTM_PREFIX/lib:$PROJECTM_PREFIX/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH"
          } >> "$GITHUB_ENV"

      - name: Build native visualizer resource
        run: npm run visualizer:build

      - name: Check Rust
        run: npm run check:rust

      - name: Build Tauri packages
        run: npm run tauri -- build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ardali-linux-${{ github.ref_name }}
          path: |
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
          if-no-files-found: warn

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
